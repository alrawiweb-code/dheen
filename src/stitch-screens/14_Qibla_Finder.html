<!DOCTYPE html>

<html class="light" lang="en"><head>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-primary": "#ffffff",
                    "surface-container-low": "#f5f3ee",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#0a6b59",
                    "on-primary-container": "#9aecd5",
                    "surface-container-high": "#eae8e3",
                    "primary-fixed-dim": "#85d6c0",
                    "tertiary": "#3a4d43",
                    "primary": "#005344",
                    "on-secondary-container": "#745c00",
                    "surface-container-highest": "#e4e2dd",
                    "inverse-on-surface": "#f2f1ec",
                    "on-tertiary-fixed-variant": "#384b41",
                    "surface-container": "#f0eee9",
                    "on-surface": "#1b1c19",
                    "on-secondary-fixed": "#241a00",
                    "primary-container": "#0f6d5b",
                    "primary-fixed": "#a1f2db",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#b6cbbf",
                    "secondary-fixed-dim": "#e9c349",
                    "on-primary-fixed": "#002019",
                    "on-secondary": "#ffffff",
                    "error": "#ba1a1a",
                    "background": "#fbf9f4",
                    "secondary-container": "#fed65b",
                    "on-tertiary-container": "#cce1d4",
                    "tertiary-fixed": "#d2e8da",
                    "on-error-container": "#93000a",

            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .qibla-gradient {
            background: radial-gradient(circle at center, #0F6D5B 0%, #002019 100%);
        }
        .compass-glow {
            box-shadow: 0 0 80px rgba(133, 214, 192, 0.15);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#FBF9F4]/80 dark:bg-[#1B1C19]/80 backdrop-blur-md shadow-[0_10px_30px_-15px_rgba(0,83,68,0.1)] flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="professional portrait of a person with a calm expression in soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtuI-oT8-urdQLYTcb2ol-57ZiP1RqstgdggTerkO2PHOPa9O6eCtxmf4fNgCSHtXgeSfYK335TQIdiTsBdx3Y8zdzhAHXyTwjIlHP2Qz7xK0WGNaISuq08vnhi1MgOfAU1ZEMw6AGboctMwyY1YD6rjSmk0LOs0NkPHH59nQVhFNM92Bkr6yLE48hIoicg8KCqafgLxBXir8SDVtszhGSchG4BDkcIw_pzWrmMkkGvfG2qEARBQF-LXsITYl7s4wQbIHVKefocifH"/>
</div>
<span class="text-[#735C00] font-bold text-sm tracking-widest uppercase">QIBLA</span>
</div>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#005344]">14 Shawwal 1446</h1>
<button class="w-10 h-10 flex items-center justify-center text-[#005344] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="brightness_high">brightness_high</span>
</button>
</nav>
<!-- Main Content Canvas -->
<main class="min-h-screen qibla-gradient flex flex-col items-center justify-center px-6 pt-20 pb-32">
<!-- Header Info -->
<div class="text-center mb-12">
<p class="text-primary-fixed font-headline font-semibold tracking-widest uppercase text-xs mb-2">Location: London, UK</p>
<h2 class="text-surface font-headline font-extrabold text-4xl tracking-tight">292° NW</h2>
<p class="text-on-primary-container/70 font-body text-sm mt-2 max-w-[240px] mx-auto">Align yourself with the arrow to face the Kaaba</p>
</div>
<!-- Compass Interface -->
<div class="relative w-[300px] h-[300px] flex items-center justify-center">
<!-- Decorative Outer Ring -->
<div class="absolute inset-0 rounded-full border border-primary-fixed/10 scale-110"></div>
<div class="absolute inset-0 rounded-full border border-primary-fixed/5 scale-125"></div>
<!-- Main Compass Disk -->
<div class="w-[260px] h-[260px] rounded-full bg-white/5 backdrop-blur-xl border border-white/10 flex items-center justify-center compass-glow relative">
<!-- Degree Markers -->
<div class="absolute inset-4 rounded-full border-[0.5px] border-white/20"></div>
<!-- Cardinal Points -->
<span class="absolute top-6 text-white/40 font-headline font-bold text-xs">N</span>
<span class="absolute right-6 text-white/40 font-headline font-bold text-xs">E</span>
<span class="absolute bottom-6 text-white/40 font-headline font-bold text-xs">S</span>
<span class="absolute left-6 text-white/40 font-headline font-bold text-xs">W</span>
<!-- Compass Indicators (Rotating element simulation) -->
<div class="absolute inset-0 flex items-center justify-center rotate-[292deg]">
<!-- The Qibla Arrow -->
<div class="relative flex flex-col items-center">
<div class="w-1.5 h-32 bg-gradient-to-t from-transparent via-secondary-container to-secondary-container rounded-full shadow-[0_0_20px_rgba(254,214,91,0.4)]"></div>
<div class="absolute -top-4 w-8 h-8 bg-secondary-container rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-secondary-fixed text-lg" style="font-variation-settings: 'FILL' 1;">mosque</span>
</div>
</div>
</div>
<!-- Center Point -->
<div class="z-10 w-4 h-4 rounded-full bg-white shadow-[0_0_10px_white]"></div>
</div>
</div>
<!-- Status Card -->
<div class="mt-16 glass-panel rounded-[24px] px-8 py-5 flex items-center gap-5 border border-white/5">
<div class="w-12 h-12 rounded-full bg-primary-container/30 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-fixed" data-icon="gps_fixed" style="font-variation-settings: 'FILL' 1;">gps_fixed</span>
</div>
<div>
<h3 class="text-surface font-headline font-bold text-base">GPS Calibrated</h3>
<p class="text-on-primary-container/60 text-xs font-body">Accuracy within 3 meters</p>
</div>
</div>
</main>
<!-- Floating Ruhani Button -->
<button class="fixed right-6 bottom-28 w-14 h-14 bg-gradient-to-br from-[#005344] to-[#0F6D5B] rounded-2xl shadow-[0_8px_30px_rgb(0,83,68,0.3)] flex items-center justify-center text-white z-40 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full px-4 pb-6 pt-3 flex justify-around items-center bg-[#FBF9F4]/90 dark:bg-[#1B1C19]/90 backdrop-blur-xl shadow-[0_-4px_24px_rgba(0,83,68,0.05)] rounded-t-[32px] z-50">
<div class="flex flex-col items-center justify-center text-[#1B1C19]/40 dark:text-[#FBF9F4]/40 hover:text-[#005344] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1B1C19]/40 dark:text-[#FBF9F4]/40 hover:text-[#005344] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Quran</span>
</div>
<div class="flex flex-col items-center justify-center text-[#005344] dark:text-[#0F6D5B] bg-[#005344]/10 rounded-2xl px-3 py-1 scale-110 duration-300">
<span class="material-symbols-outlined mb-1" data-icon="auto_awesome_motion" style="font-variation-settings: 'FILL' 1;">auto_awesome_motion</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Prayers</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1B1C19]/40 dark:text-[#FBF9F4]/40 hover:text-[#005344] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="auto_stories">auto_stories</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Duas</span>
</div>
<div class="flex flex-col items-center justify-center text-[#1B1C19]/40 dark:text-[#FBF9F4]/40 hover:text-[#005344] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Profile</span>
</div>
</nav>
</body></html>
