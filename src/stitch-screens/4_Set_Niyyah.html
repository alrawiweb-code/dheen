<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;family=Noto+Naskh+Arabic:wght@400;700&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#0d1f17",
                    "on-primary-fixed-variant": "#005142",
                    "surface-bright": "#fbf9f4",
                    "error-container": "#ffdad6",

                    "surface-dim": "#dbdad5",
                    "outline": "#6f7975",
                    "secondary-fixed": "#ffe088",
                    "on-surface-variant": "#3f4945",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#f5f3ee",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#0a6b59",
                    "on-primary-container": "#9aecd5",
                    "surface-container-high": "#eae8e3",
                    "primary-fixed-dim": "#85d6c0",
                    "tertiary": "#3a4d43",
                    "primary": "#005344",
                    "on-secondary-container": "#745c00",
                    "surface-container-highest": "#e4e2dd",
                    "inverse-on-surface": "#f2f1ec",
                    "on-tertiary-fixed-variant": "#384b41",
                    "surface-container": "#f0eee9",
                    "on-surface": "#1b1c19",
                    "on-secondary-fixed": "#241a00",
                    "primary-container": "#0f6d5b",
                    "primary-fixed": "#a1f2db",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#b6cbbf",
                    "secondary-fixed-dim": "#e9c349",
                    "on-primary-fixed": "#002019",
                    "on-secondary": "#ffffff",
                    "error": "#ba1a1a",
                    "background": "#fbf9f4",
                    "secondary-container": "#fed65b",
                    "on-tertiary-container": "#cce1d4",
                    "tertiary-fixed": "#d2e8da",
                    "on-error-container": "#93000a",
                    "outline-variant": "#bec9c4",

                    "on-error": "#ffffff",

            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "3xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-niyyah-pattern {
            background-color: #0d1f17;
            background-image: radial-gradient(circle at 2px 2px, rgba(115, 92, 0, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .light-ray-gradient {
            background: radial-gradient(circle at top right, rgba(154, 236, 213, 0.08) 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-on-tertiary-fixed font-body text-surface selection:bg-secondary-container/30">
<!-- Screen 2.1 - Niyyah Micro-Screen -->
<main class="relative min-h-screen flex flex-col items-center justify-center bg-niyyah-pattern overflow-hidden px-6">
<!-- Ambient Atmospheric Decor -->
<div class="absolute top-0 right-0 w-full h-full light-ray-gradient pointer-events-none"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[140px] pointer-events-none"></div>
<!-- Exit Action -->
<div class="absolute top-8 left-6">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest/5 rounded-full backdrop-blur-xl hover:bg-surface-container-lowest/10 transition-all duration-300">
<span class="material-symbols-outlined text-surface" data-icon="close">close</span>
</button>
</div>
<!-- Content Canvas -->
<div class="w-full max-w-md flex flex-col space-y-12 relative z-10">
<!-- Header Section -->
<header class="space-y-4">
<div class="flex flex-col items-start">
<span class="text-secondary font-headline font-bold text-sm tracking-[0.2em] uppercase mb-2">Intentionality</span>
<h1 class="text-4xl md:text-5xl font-headline font-extrabold text-surface-bright leading-tight">
                        Set Your <br/> <span class="text-secondary-fixed">Niyyah</span>
</h1>
</div>
<p class="text-surface-variant/70 text-lg max-w-[280px] font-medium leading-relaxed">
                    Actions are judged by the intention behind them. Take a moment to align your heart.
                </p>
</header>
<!-- Preset Pills Selection (Asymmetric Layout) -->
<div class="space-y-6">
<label class="text-surface-variant/40 font-headline font-semibold text-xs tracking-widest uppercase">Select an Intention</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-3 rounded-2xl bg-surface-container-lowest/5 border border-outline-variant/10 hover:border-secondary-fixed/50 hover:bg-surface-container-lowest/10 transition-all duration-300 group">
<span class="text-surface font-semibold text-sm group-hover:text-secondary-fixed">For knowledge</span>
</button>
<button class="px-5 py-3 rounded-2xl bg-secondary-fixed/10 border border-secondary-fixed/30 transition-all duration-300">
<span class="text-secondary-fixed font-semibold text-sm">For healing</span>
</button>
<button class="px-5 py-3 rounded-2xl bg-surface-container-lowest/5 border border-outline-variant/10 hover:border-secondary-fixed/50 hover:bg-surface-container-lowest/10 transition-all duration-300 group">
<span class="text-surface font-semibold text-sm group-hover:text-secondary-fixed">For my family</span>
</button>
<button class="px-5 py-3 rounded-2xl bg-surface-container-lowest/5 border border-outline-variant/10 hover:border-secondary-fixed/50 hover:bg-surface-container-lowest/10 transition-all duration-300 group">
<span class="text-surface font-semibold text-sm group-hover:text-secondary-fixed">For Allah alone</span>
</button>
</div>
</div>
<!-- Free Text Input -->
<div class="space-y-4">
<div class="relative">
<textarea class="w-full bg-surface-container-lowest/5 border-none rounded-3xl p-6 text-surface placeholder:text-surface-variant/30 focus:ring-2 focus:ring-secondary/40 focus:bg-surface-container-lowest/10 transition-all resize-none font-medium text-lg leading-relaxed" placeholder="Or type a custom intention..." rows="3"></textarea>
<div class="absolute bottom-4 right-6 pointer-events-none">
<span class="material-symbols-outlined text-surface-variant/20" data-icon="edit_note">edit_note</span>
</div>
</div>
</div>
<!-- Call to Action -->
<div class="pt-4 flex flex-col items-center">
<button class="group w-full py-5 rounded-[20px] bg-gradient-to-br from-secondary to-[#5a4800] text-on-secondary-fixed font-headline font-bold text-lg shadow-[0_20px_40px_-12px_rgba(115,92,0,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3">
                    Set Niyyah
                    <span class="material-symbols-outlined text-on-secondary-fixed text-xl group-hover:translate-x-1 transition-transform" data-icon="east">east</span>
</button>
<p class="mt-6 text-surface-variant/30 text-xs font-semibold tracking-tighter italic">"Verily, every man shall have but that which he intended."</p>
</div>
</div>
<!-- Decorative Background Element -->
<div class="absolute bottom-0 right-0 opacity-10 pointer-events-none">
<img alt="Decorative crescent moon illustration" class="w-[400px] h-[400px] translate-x-1/4 translate-y-1/4 rotate-[-15deg]" data-alt="A stylized geometric islamic pattern representation with soft organic curves and mystical golden glow over deep forest green background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3yR3ouoU13_brtADoVNIBQNWzhVgSElC7DtePDNEQb3wxMBRrHSXuTRwK--_gkpkZDXsWif1sZtnGLAmmLK7khPjikJgrB8lRQpGLRqLPHKwc8V-tRiZaPq6lShOKmKUnxya5QV08uvCllYHBSTyfUXSG0s0INMhwN2nNvnwd3yuMMCUEy77Xv4pJbXZ86DwQm6RJHmv24pSRSldB-cvbETtCUCfUVxjpOG0V8wMqgTMlWkDuHfhDRmNCWkBrCH7iIa9sacjSQipB"/>
</div>
</main>
<!-- Suppressed Navigation as per Task Focus Mandate: Task-Focused Screen implies a temporary departure -->
</body></html>
