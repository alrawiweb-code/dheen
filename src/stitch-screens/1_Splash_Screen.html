<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Assalamu Alaikum - Space of Peace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;family=Noto+Naskh+Arabic:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#0d1f17",
                        "on-primary-fixed-variant": "#005142",
                        "surface-bright": "#fbf9f4",
                        "error-container": "#ffdad6",
                        "surface": "#fbf9f4",
                        "surface-variant": "#e4e2dd",
                        "inverse-primary": "#85d6c0",
                        "tertiary-container": "#52655b",
                        "surface-dim": "#dbdad5",
                        "outline": "#6f7975",
                        "secondary-fixed": "#ffe088",
                        "on-surface-variant": "#3f4945",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f5f3ee",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#0a6b59",
                        "on-primary-container": "#9aecd5",
                        "surface-container-high": "#eae8e3",
                        "primary-fixed-dim": "#85d6c0",
                        "tertiary": "#3a4d43",
                        "primary": "#005344",
                        "on-secondary-container": "#745c00",
                        "surface-container-highest": "#e4e2dd",
                        "inverse-on-surface": "#f2f1ec",
                        "on-tertiary-fixed-variant": "#384b41",
                        "surface-container": "#f0eee9",
                        "on-surface": "#1b1c19",
                        "on-secondary-fixed": "#241a00",
                        "primary-container": "#0f6d5b",
                        "primary-fixed": "#a1f2db",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#b6cbbf",
                        "secondary-fixed-dim": "#e9c349",
                        "on-primary-fixed": "#002019",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "background": "#fbf9f4",
                        "secondary-container": "#fed65b",
                        "on-tertiary-container": "#cce1d4",
                        "tertiary-fixed": "#d2e8da",
                        "on-error-container": "#93000a",
                        "outline-variant": "#bec9c4",
                        "on-background": "#1b1c19",
                        "inverse-surface": "#30312e",
                        "on-error": "#ffffff",
                        "secondary": "#735c00",
                        "on-secondary-fixed-variant": "#574500"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"],
                        "arabic": ["Noto Naskh Arabic"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .splash-gradient {
            background: linear-gradient(135deg, #0A3D2B 0%, #005344 40%, #FBF9F4 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full splash-gradient flex flex-col items-center justify-center px-8 text-center overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<!-- Light Rays Effect -->
<div class="absolute -top-1/4 -left-1/4 w-[150%] h-[150%] bg-[radial-gradient(circle_at_center,rgba(133,214,192,0.1)_0%,transparent_70%)]"></div>
<!-- Horizon Mosque Silhouette (Bottom) -->
<div class="absolute bottom-0 left-0 w-full opacity-10">
<div class="flex items-end justify-center gap-2">
<div class="w-16 h-32 bg-primary rounded-t-full"></div>
<div class="w-24 h-48 bg-primary rounded-t-full flex items-center justify-center">
<div class="w-16 h-16 bg-primary-container rounded-full mt-4 opacity-50"></div>
</div>
<div class="w-32 h-64 bg-primary rounded-t-full"></div>
<div class="w-24 h-48 bg-primary rounded-t-full"></div>
<div class="w-16 h-32 bg-primary rounded-t-full"></div>
</div>
</div>
</div>
<!-- Content Area -->
<div class="relative z-10 flex flex-col items-center">
<!-- Logo Section: Gold Crescent + Star -->
<div class="relative mb-12 flex items-center justify-center">
<!-- Floating Effect via Container -->
<div class="relative w-32 h-32 flex items-center justify-center transition-transform duration-1000">
<span class="material-symbols-outlined text-[100px] text-secondary-fixed leading-none" style="font-variation-settings: 'FILL' 1;">
                        brightness_3
                    </span>
<span class="material-symbols-outlined absolute text-[24px] text-secondary-fixed right-4 top-4" style="font-variation-settings: 'FILL' 1;">
                        star
                    </span>
</div>
<!-- Subtle Glow -->
<div class="absolute w-40 h-40 bg-secondary/10 rounded-full blur-3xl -z-10"></div>
</div>
<!-- Text Content -->
<div class="space-y-4">
<h1 class="font-headline font-bold text-[28px] tracking-tight text-on-primary">
                    Assalamu Alaikum
                </h1>
<p class="font-label text-[16px] text-secondary-fixed-dim font-medium tracking-wide">
                    Welcome to your space of peace
                </p>
</div>
<!-- Arabic Subtext for Visual Texture -->
<div class="mt-8 opacity-20">
<span class="font-arabic text-4xl text-on-primary">السَّلَامُ عَلَيْكُمْ</span>
</div>
<!-- Interaction Prompt (Subtle) -->
<div class="mt-24">
<button class="glass-panel px-8 py-3 rounded-xl border border-on-primary/10 flex items-center gap-3 text-on-primary hover:bg-white/10 transition-all duration-300">
<span class="text-sm font-semibold tracking-widest uppercase">Begin Journey</span>
<span class="material-symbols-outlined text-sm">arrow_forward_ios</span>
</button>
</div>
</div>
<!-- Navigation Shell Filtering: Prohibited on Splash Screen as per the "Destination" Rule -->
<!-- Suppressing TopAppBar and BottomNavBar to prioritize the content canvas -->
</main>
<!-- Visual Polish: Soft Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[100]">
<svg viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<filter id="noiseFilter">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noiseFilter)" height="100" width="100"></rect>
</svg>
</div>
</body></html>
